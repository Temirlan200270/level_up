      desc: "Острый клык. Можно продать в магазин."
      price: 10

  consumables:
    - id: "pot_heal_streak"
      name: "Status Recovery Potion"
      rarity: rare
      desc: "Восстанавливает потерянный стрик задач."
      effect: "restore_streak"
      price: 500

    - id: "scroll_double_xp"
      name: "Scroll of Wisdom"
      rarity: epic
      desc: "Удваивает опыт на следующий час."
      effect: "xp_multiplier_2x"
      duration: 3600

  equipment:
    - id: "wep_dagger_c"
      name: "Knight Killer"
      rarity: epic
      desc: "+10% к опыту за сложные задачи."
      slot: "weapon"
      passive_bonus: {"xp_hard_quest": 0.1}

  skills:
    - id: "skill_sprint"
      name: "Sprint"
      type: active
      desc: "Заверши задачу за 30 мин и получи x2 награду."
      cooldown: 86400 (24 hours)
      
    - id: "skill_stealth"
      name: "Stealth"
      type: passive
      desc: "Снижает штраф за провал задачи на 20%."

# ==========================================
# 5. ASSETS (Ресурсы)
# Папка: assets/icons/
# ==========================================
assets_needed:
  - icon_potion.png
  - icon_dagger.png
  - icon_wolf_fang.png
  - icon_skill_sprint.png
  - icon_coin.png
  - sound_item_drop.mp3 (Optional)
  - sound_level_up.mp3 (Optional)