<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <!-- >=>E@><=K5 D>@<K: F25B 7040Q< 2 Flutter G5@57 ColorFilter -->
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.00"/>
    </linearGradient>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1"/>
      <path d="M36 0V72M0 36H72" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#grid)"/>

  <!-- 5>=>2K5 ?>@B0;K (<>=>E@><=>) -->
  <g filter="url(#glow)">
    <circle cx="220" cy="360" r="210" fill="url(#g)"/>
    <circle cx="860" cy="520" r="240" fill="url(#g)"/>
    <circle cx="620" cy="1480" r="320" fill="url(#g)"/>
  </g>

  <!-- 803>=0;L=K5 ;8=88 -->
  <g opacity="0.22">
    <path d="M-80 440 L520 -80" stroke="#FFFFFF" stroke-opacity="0.20" stroke-width="2"/>
    <path d="M-120 820 L740 -120" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="2"/>
    <path d="M260 2000 L1180 1080" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="2"/>
    <path d="M-80 1840 L520 1320" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2"/>
  </g>
</svg>

