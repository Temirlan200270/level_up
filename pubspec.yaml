name: level_up
description: "Solo Leveling System (Ultimate Edition)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  
  # State Management
  flutter_riverpod: 2.6.1
  
  # Local Database
  hive: 2.2.3
  hive_flutter: 1.1.0
  path_provider: 2.1.5
  
  # Utilities
  uuid: 4.5.1
  shared_preferences: 2.5.3
  
  # HTTP & API
  http: ^1.2.2
  collection: ^1.19.1
  supabase_flutter: 2.8.4
  google_fonts: 8.0.2
  flutter_secure_storage: ^10.0.0
  fl_chart: ^1.2.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  home_widget: ^0.7.0
  lottie: ^3.3.1
  workmanager: ^0.9.0+3
  audioplayers: ^6.6.0
  health: ^13.3.1
  permission_handler: ^12.0.1
  animations: ^2.1.1
  intl: ^0.20.2
  go_router: ^17.1.0
  cached_network_image: ^3.4.1
  flutter_staggered_animations: ^1.1.1
  sliver_tools: ^0.2.12
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  freezed: ^2.5.2
  freezed_annotation: ^2.4.4

flutter:
  uses-material-design: true

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
        - asset: assets/fonts/Manrope-ExtraBold.ttf
          weight: 800

  assets:
    - assets/fonts/
    - assets/translations/
    - assets/agent_rules.txt
    - assets/themes/
    - assets/backgrounds/solo_bg.svg
    - assets/backgrounds/archmage_bg.svg
    - assets/backgrounds/cultivation_bg.svg
    - assets/lottie/level_up.json
